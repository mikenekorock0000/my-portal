<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カレンダーテンプレート生成</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f4f6fa;
      margin: 0;
      padding: 24px 16px;
      color: #222;
    }
    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      padding: 28px 24px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }
    .desc {
      margin: 0 0 22px;
      color: #666;
      font-size: 13px;
      line-height: 1.6;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1.5px solid #d6dae3;
      border-radius: 8px;
      background: #fff;
      appearance: none;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #1565C0;
    }
    .row { margin-bottom: 18px; }
    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #1565C0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover:not(:disabled) { background: #0d47a1; }
    button:disabled {
      background: #9bb4d3;
      cursor: not-allowed;
    }
    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
    }
    .status.show { display: block; }
    .status.loading { background: #eef3fb; color: #1565C0; }
    .status.error { background: #fdecea; color: #c62828; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .links { margin-top: 10px; }
    .links a {
      display: block;
      padding: 10px 12px;
      margin-top: 8px;
      background: #fff;
      border: 1px solid #c8e6c9;
      border-radius: 8px;
      color: #1b5e20;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .links a:hover { background: #f1f8e9; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #1565C0;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>カレンダーテンプレート生成</h1>
    <p class="desc">
      4月始まりの12か月カレンダー(上下6か月ずつ)をベクター形式で生成し、
      Google Drive のマイドライブ直下に SVG と PDF を保存します。
    </p>

    <div class="row">
      <label for="year">出力年(4月始まりの開始年)</label>
      <select id="year"></select>
      <div class="hint">例: 2026 を選ぶと 2026/4 〜 2027/3 のカレンダーが生成されます</div>
    </div>

    <button id="generateBtn" onclick="onGenerate()">生成して Drive に保存</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    (function initYearOptions() {
      const sel = document.getElementById('year');
      const now = new Date().getFullYear();
      // 当年を中心に -3 〜 +5 年
      for (let y = now - 3; y <= now + 5; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '年度 (' + y + '/4 〜 ' + (y + 1) + '/3)';
        if (y === now) opt.selected = true;
        sel.appendChild(opt);
      }
    })();

    function setStatus(kind, html) {
      const el = document.getElementById('status');
      el.className = 'status show ' + kind;
      el.innerHTML = html;
    }

    function onGenerate() {
      const btn = document.getElementById('generateBtn');
      const year = parseInt(document.getElementById('year').value, 10);
      btn.disabled = true;
      setStatus('loading', '<span class="spinner"></span>生成中... (10〜30秒ほどかかります)');

      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false;
          setStatus('success',
            '<div><strong>完了しました。</strong></div>' +
            '<div class="links">' +
              '<a href="' + res.pdfUrl + '" target="_blank">' + res.pdfName + ' (PDF) を開く</a>' +
              '<a href="' + res.svgUrl + '" target="_blank">' + res.svgName + ' (SVG) を開く</a>' +
            '</div>'
          );
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          setStatus('error', 'エラー: ' + (err && err.message ? err.message : err));
        })
        .generate(year);
    }
  </script>
</body>
</html>
