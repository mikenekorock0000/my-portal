<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* 基本スタイル */
    body { margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-size: cover; background-position: center; background-attachment: fixed; transition: background-image 0.5s ease-in-out; color: #ffffff; text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6); background-color: #2c3e50; overscroll-behavior-y: none; }
    .container { max-width: 1600px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .glass { background: rgba(20, 20, 20, 0.45); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
    header { display: flex; flex-direction: column; gap: 15px; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; }
    #clock-widget h1 { margin: 0; font-weight: 300; letter-spacing: 2px; line-height: 1.1; transition: all 0.2s;}
    #clock-widget p { margin: 5px 0 0 0; font-size: 1rem; color: rgba(255,255,255,0.8); }

    .market-ticker-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px; }
    .market-item { display: flex; align-items: baseline; gap: 6px; background: rgba(0,0,0,0.25); padding: 6px 14px; border-radius: 8px; white-space: nowrap; }
    .diff-up { color: #ff8a80; } .diff-down { color: #82c8ff; }
    
    .headline-ticker { width: 100%; overflow: hidden; white-space: nowrap; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px 0; position: relative; }
    .headline-content { display: inline-block; padding-left: 100%; animation: marquee 45s linear infinite; }
    .headline-ticker:hover .headline-content { animation-play-state: paused; }
    .headline-item { margin-right: 50px; color: #fff; text-decoration: none; font-size: 0.95rem; }
    .headline-badge { background: #E50914; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 8px; font-weight: bold; }
    @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

    /* サジェストUI */
    .stock-search-wrapper { position: relative; width: 300px; }
    #stock-suggestions { position: absolute; top: 100%; left: 0; right: 0; z-index: 9999; background: rgba(30,30,30,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; max-height: 350px; overflow-y: auto; margin-top: 5px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .suggestion-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
    .suggestion-item:hover { background: rgba(255,255,255,0.15); }
    .suggestion-item div:first-child { font-weight: bold; color: #82c8ff; font-size: 0.9rem; pointer-events: none; }
    .suggestion-item div:last-child { font-size: 0.75rem; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
    .suggestion-badge { background: #4caf50; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; margin-left: 5px; vertical-align: middle; }

    /* 検索窓 & Gemini */
    .search-container { display: flex; flex-direction: column; align-items: center; margin-top: 10px; width: 100%; }
    .search-bar { display: flex; gap: 10px; width: 100%; max-width: 750px; position: relative; }
    .search-input { flex-grow: 1; padding: 12px 20px; border-radius: 25px; border: 2px solid transparent; font-size: 1.05rem; outline: none; color: #333; }
    .gemini-btn { border-radius: 25px; padding: 0 20px; background: linear-gradient(135deg, #1a73e8, #8ab4f8); border: none; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
    .gemini-btn.active { background: linear-gradient(135deg, #0d47a1, #1976d2); border: 2px solid #fff; }
    .gemini-options-panel { display: none; justify-content: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .gemini-opt-label { background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

    /* レイアウト & 編集モード */
    .edit-only { display: none !important; }
    body.is-edit-mode .edit-only { display: flex !important; }
    #widget-container { display: flex; flex-direction: column; gap: 15px; }
    .dashboard-row { display: flex; gap: 15px; width: 100%; align-items: stretch; transition: padding 0.3s; }
    body.is-edit-mode .dashboard-row { padding: 15px; background: rgba(0,0,0,0.15); border: 1px dashed rgba(255,255,255,0.2); border-radius: 15px; }
    .widget-wrapper { display: flex; flex-direction: column; position: relative; }
    .widget-resizer { position: absolute; right: -12px; top: 10%; bottom: 10%; width: 10px; cursor: col-resize; z-index: 50; }
    .widget-resizer::after { content: ""; width: 4px; height: 30px; background: rgba(255,255,255,0.3); border-radius: 2px; position: absolute; left: 3px; top: 50%; transform: translateY(-50%); }
    .widget-drag-handle { cursor: grab; padding-right: 10px; font-size: 1.2rem; color: #82c8ff; display: none; }
    body.is-edit-mode .widget-drag-handle { display: block; }
    .widget-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 15px; }
    .widget-header h2 { margin: 0; font-size: 1.1rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .preset-btn { padding: 4px 8px; font-size: 0.75rem; background: transparent; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; color: white; cursor: pointer; }

    /* カレンダー */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: rgba(255,255,255,0.15); border-radius: 8px; overflow: hidden; }
    .cal-day-header { text-align: center; font-size: 0.8rem; padding: 6px 0; background: rgba(0,0,0,0.4); }
    .cal-cell { min-height: 85px; background: rgba(0,0,0,0.25); padding: 4px; display: flex; flex-direction: column; gap: 2px; }
    .cal-date { font-size: 0.85rem; text-align: right; color: #eee; }
    .cal-event { font-size: 0.75rem; padding: 3px 6px; border-radius: 4px; color: #fff; font-weight: 500; text-shadow: 1px 1px 2px #000; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 8px; margin-bottom: 5px; background: rgba(255,255,255,0.05); border-radius: 8px; }
    .item-content a { color: #fff; text-decoration: none; }
    .drag-handle { cursor: grab; padding: 0 10px 0 0; color: rgba(255,255,255,0.5); font-size: 1.5rem; }

    .ui-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; transition: 0.2s; }
    .primary-btn { background: rgba(0,122,255,0.5); }
    .danger-btn { background: rgba(255,0,0,0.3); }
    input[type="text"].edit-input, select { padding: 8px 12px; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.9); color: #333; outline: none; }
  </style>
</head>
<body>

<div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
  <h2>⚠️ 起動エラーを検知しました</h2>
  <button onclick="localStorage.removeItem('portal_state'); location.reload();" style="margin-top:20px; padding:15px 30px; font-size:1.1rem; background:#E50914; color:white; border:none; border-radius:8px; cursor:pointer;">リセットして復旧</button>
</div>

<div class="container" id="main-app">
  <header class="glass">
    <div class="header-top">
      <div id="clock-widget" style="display:flex; align-items: center; gap: 15px;">
        <div><h1 id="time">00:00</h1><p id="date">--</p></div>
        <div class="edit-only" style="flex-direction: column; gap: 5px;">
          <input type="range" id="clock-size" min="1.5" max="5.0" step="0.1" oninput="applyClockStyle()" onchange="saveHeaderSettings()">
          <select id="clock-font" onchange="applyClockStyle(); saveHeaderSettings();">
            <option value="system-ui">標準</option>
            <option value="'Noto Serif JP', serif">明朝体</option>
            <option value="'Courier New', monospace">等幅</option>
          </select>
        </div>
      </div>
      
      <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
        <div id="market-ticker" class="market-ticker-container"></div>
        <div class="edit-only" style="margin-top:5px; gap:10px; align-items:center;">
          <div class="stock-search-wrapper">
            <input type="text" id="stock-search-input" class="edit-input" placeholder="一般名で検索 (例: 全世界, S&P500, 金)" style="width:100%;">
            <div id="stock-suggestions"></div>
          </div>
        </div>
      </div>
      
      <div style="display: flex; gap: 10px; align-items: center;">
        <div class="edit-only" style="gap: 5px;">
          <input type="text" class="edit-input" id="bg-url" placeholder="背景画像URL" style="width: 150px; font-size: 0.8rem;">
          <button class="ui-btn" onclick="changeBackground()">適用</button>
        </div>
        <button id="edit-toggle-btn" class="ui-btn primary-btn" onclick="toggleEditMode()">⚙️ 編集モード</button>
      </div>
    </div>

    <div class="headline-ticker glass" style="margin-top:10px; padding:0;">
      <div class="headline-content" id="headline-content">ニュース読込中...</div>
    </div>
    <div class="edit-only" style="gap:10px; align-items:flex-start; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; margin-top:5px;">
      <textarea id="headline-url" placeholder="RSS URL（1行に1つ、複数可）" rows="3" style="flex-grow:1; font-family: monospace; font-size: 0.85rem; padding: 8px 12px; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.9); color: #333; outline: none; resize: vertical;"></textarea>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end;">
        <span style="font-size:0.8rem;">速度:</span>
        <input type="range" id="headline-speed" min="10" max="120" oninput="applyHeadlineSpeed()" onchange="saveHeaderSettings()">
        <button class="ui-btn" onclick="saveHeaderSettings(); fetchHeadlineRss();">更新</button>
      </div>
    </div>

    <div class="search-container">
      <div class="search-bar">
        <form onsubmit="handleSearchSubmit(event)" style="display:flex; flex-grow:1;">
          <input type="text" id="main-search-input" class="search-input" placeholder="Google / Gemini 検索..." autocomplete="off">
          <button type="submit" class="ui-btn" style="border-radius:0 25px 25px 0; margin-left:-50px; background:none; border:none; color:#333;">🔍</button>
        </form>
        <button type="button" id="gemini-toggle-btn" class="gemini-btn" onclick="toggleGeminiMode()">✨ Gemini</button>
      </div>
      <div id="gemini-options-panel" class="gemini-options-panel">
        <label class="gemini-opt-label"><input type="checkbox" id="gem-opt-think"> 🧠 思考</label>
        <label class="gemini-opt-label"><input type="checkbox" id="gem-opt-prog"> 💻 プロ</label>
        <label class="gemini-opt-label"><input type="checkbox" id="gem-opt-step"> 📋 順序</label>
      </div>
    </div>
  </header>

  <main id="widget-container"></main>

  <div class="edit-only" style="justify-content: center; gap: 15px; margin-top: 20px; width: 100%; flex-wrap: wrap;">
    <button class="ui-btn" onclick="addNewWidget('bookmark')">＋ ブックマーク</button>
    <button class="ui-btn" onclick="addNewWidget('rss')">＋ RSS</button>
    <button class="ui-btn" onclick="addNewWidget('calendar')">＋ カレンダー</button>
    <button class="ui-btn" onclick="addNewWidget('chart')" style="background:rgba(0,150,136,0.3); border-color:rgba(0,150,136,0.5);">＋ 比較チャート</button>
    <button class="ui-btn" onclick="addNewWidget('nisa')" style="background:rgba(233,30,99,0.3); border-color:rgba(233,30,99,0.5);">＋ 投資信託 (NISA)</button>
    <button class="ui-btn" onclick="addNewWidget('spacer')">＋ 空白</button>
    <button class="ui-btn primary-btn" onclick="addNewRow()">＋ 段追加</button>
  </div>
</div>

<script>
  // ==========================================
  // API URL
  // ==========================================
  const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxzjNS50HSy3lGFx3jM5u6hlJwh5t76t6bQmHzjMy1Z_0Z_7aVwvDzy-UOAKSmdXxkpWQ/exec';

  var appState = null;
  var isEditMode = false;
  var isGeminiMode = false;
  var rssCache = {};
  var calCache = {};
  var chartDataCache = {};
  var nisaDataCache = {};
  var resizeData = null;
  var dragEl = null;
  var dragType = null;
  var sourceId = null;
  var searchTimeout = null;

  const CHART_COLORS = ['#8ab4f8', '#f28b82', '#fdd663', '#b388ff', '#81c995', '#ffb74d', '#4dd0e1', '#f48fb1'];

  const CUSTOM_ALIASES = [
    { name: "全世界株式 (オルカン / MAXIS ETF)", symbol: "2559.T", type: "国内ETF" },
    { name: "全世界株式 (VT / 米国ETF)", symbol: "VT", type: "米国ETF" },
    { name: "S&P500 (MAXIS ETF)", symbol: "2558.T", type: "国内ETF" },
    { name: "S&P500 (VOO / 米国ETF)", symbol: "VOO", type: "米国ETF" },
    { name: "S&P500 (SPY / 米国ETF)", symbol: "SPY", type: "米国ETF" },
    { name: "S&P500 (指数)", symbol: "^GSPC", type: "指数" },
    { name: "日経平均 (指数)", symbol: "^N225", type: "指数" },
    { name: "日経平均 (ETF)", symbol: "1321.T", type: "国内ETF" },
    { name: "TOPIX (指数)", symbol: "^TOPX", type: "指数" },
    { name: "NASDAQ 100 (QQQ)", symbol: "QQQ", type: "米国ETF" },
    { name: "高配当 (VYM / 米国ETF)", symbol: "VYM", type: "米国ETF" },
    { name: "高配当 (SPYD / 米国ETF)", symbol: "SPYD", type: "米国ETF" },
    { name: "ドル円 (為替)", symbol: "USDJPY=X", type: "為替" },
    { name: "ユーロ円 (為替)", symbol: "EURJPY=X", type: "為替" },
    { name: "金 / ゴールド (GLD)", symbol: "GLD", type: "コモディティ" },
    { name: "金 / ゴールド (国内ETF)", symbol: "1540.T", type: "国内ETF" },
    { name: "原油 (WTI)", symbol: "CL=F", type: "コモディティ" },
    { name: "ビットコイン (BTC)", symbol: "BTC-USD", type: "暗号資産" }
  ];

  async function callGasApi(params) {
    try {
      const query = new URLSearchParams(params).toString();
      const res = await fetch(`${GAS_API_URL}?${query}`);
      return await res.json();
    } catch (e) { return { data: '', error: e.message }; }
  }

  function hexToRgba(hex, a) {
    let r=0,g=0,b=0; 
    if(!hex) return `rgba(128,128,128,${a})`;
    if(hex.length===4){ r=parseInt(hex[1]+hex[1],16); g=parseInt(hex[2]+hex[2],16); b=parseInt(hex[3]+hex[3],16); }
    else if(hex.length===7){ r=parseInt(hex.substr(1,2),16); g=parseInt(hex.substr(3,2),16); b=parseInt(hex.substr(5,2),16); }
    return `rgba(${r},${g},${b},${a})`;
  }

  function focusStockSearch() {
    if(!isEditMode) toggleEditMode();
    setTimeout(() => {
      const input = document.getElementById('stock-search-input');
      if(input) {
        input.focus();
        input.scrollIntoView({behavior:'smooth', block:'center'});
        input.style.transition = 'box-shadow 0.3s';
        input.style.boxShadow = '0 0 15px #8ab4f8';
        setTimeout(() => input.style.boxShadow = 'none', 1500);
      }
    }, 100);
  }

  // 銘柄検索 (サジェストUI連携)
  async function initStockSearch() {
    const input = document.getElementById('stock-search-input');
    const suggestBox = document.getElementById('stock-suggestions');
    
    input.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const query = input.value.trim();
      if (!query) { suggestBox.style.display = 'none'; return; }
      
      suggestBox.innerHTML = '<div style="padding:15px; color:#aaa; font-size:0.85rem; text-align:center;">検索中...</div>';
      suggestBox.style.display = 'block';

      searchTimeout = setTimeout(async () => {
        let htmlStr = '';
        const qLower = query.toLowerCase();
        const localMatches = CUSTOM_ALIASES.filter(item => 
          item.name.toLowerCase().includes(qLower) || 
          item.symbol.toLowerCase().includes(qLower) ||
          (qLower === 'オルカン' && item.name.includes('全世界'))
        );
        
        if (localMatches.length > 0) {
          htmlStr += localMatches.map(q => {
            const safeName = q.name.replace(/'/g, "\\'");
            return `<div class="suggestion-item" onmousedown="window.selectStock('${q.symbol}', '${safeName}')" ontouchstart="window.selectStock('${q.symbol}', '${safeName}')">
                      <div>${q.symbol} <span class="suggestion-badge">${q.type}</span></div>
                      <div>${q.name}</div>
                    </div>`;
          }).join('');
        }

        const res = await callGasApi({ action: 'searchStock', q: query });
        if (res && res.quotes && res.quotes.length > 0) {
          const apiUnique = res.quotes.filter(q => !localMatches.some(l => l.symbol === q.symbol));
          htmlStr += apiUnique.map(q => {
            const safeName = (q.shortname || q.longname || q.symbol).replace(/'/g, "\\'").replace(/"/g, '&quot;');
            return `<div class="suggestion-item" onmousedown="window.selectStock('${q.symbol}', '${safeName}')" ontouchstart="window.selectStock('${q.symbol}', '${safeName}')">
                      <div>${q.symbol}</div>
                      <div>${q.shortname || q.longname || ''} <span style="opacity:0.6;">(${q.exchDisp || '不明'})</span></div>
                    </div>`;
          }).join('');
        }

        if (htmlStr === '') {
          suggestBox.innerHTML = '<div style="padding:15px; color:#aaa; font-size:0.85rem; text-align:center;">見つかりませんでした</div>';
        } else {
          suggestBox.innerHTML = htmlStr;
        }
      }, 400); 
    });

    input.addEventListener('blur', () => { setTimeout(() => { suggestBox.style.display = 'none'; }, 200); });
  }

  window.selectStock = function(symbol, name) {
    if(!appState.markets) appState.markets = [];
    if(appState.markets.some(m => m.symbol === symbol)) {
      alert('「' + name + '」は既に登録されています');
    } else {
      appState.markets.push({ symbol: symbol, label: name });
      save(); 
      fetchMarketTicker();
      Object.keys(chartDataCache).forEach(k => { chartDataCache[k].raw = []; }); 
      renderAll(); 
    }
    document.getElementById('stock-search-input').value = '';
    document.getElementById('stock-suggestions').style.display = 'none';
  };

  function toggleGeminiMode() { isGeminiMode = !isGeminiMode; document.getElementById('gemini-options-panel').style.display = isGeminiMode ? 'flex' : 'none'; document.getElementById('gemini-toggle-btn').classList.toggle('active', isGeminiMode); }
  function handleSearchSubmit(e) {
    e.preventDefault();
    const q = document.getElementById('main-search-input').value.trim(); if(!q) return;
    if (isGeminiMode) {
      let opts = [];
      if (document.getElementById('gem-opt-think').checked) opts.push("思考プロセスを開示して。");
      if (document.getElementById('gem-opt-prog').checked) opts.push("プログラマ視点でコードを含めて。");
      if (document.getElementById('gem-opt-step').checked) opts.push("ステップバイステップで。");
      const finalQ = opts.length ? "【指示】" + opts.join(" ") + "\n\n" + q : q;
      window.open('https://gemini.google.com/app?q=' + encodeURIComponent(finalQ), '_blank');
    } else { window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank'); }
  }

  function applyBackground() { if (appState.bgUrl) { document.body.style.backgroundImage = `url('${appState.bgUrl}')`; document.getElementById('bg-url').value = appState.bgUrl; } }
  function changeBackground() { appState.bgUrl = document.getElementById('bg-url').value; applyBackground(); save(); }
  function applyClockStyle() { const t = document.getElementById('time'); if(t){ t.style.fontSize = document.getElementById('clock-size').value + 'rem'; t.style.fontFamily = document.getElementById('clock-font').value; } }
  function applyHeadlineSpeed() { const s = document.getElementById('headline-speed').value; const el = document.querySelector('.headline-content'); if(el) el.style.animationDuration = s + 's'; }

  async function fetchHeadlineRss() {
    const urls = appState.headlineUrls || [];
    if(!urls.length) return;
    const all = [];
    await Promise.all(urls.map(async (url) => {
      try {
        const res = await callGasApi({ action: 'rss', url });
        if(!res.data) return;
        const xml = new DOMParser().parseFromString(res.data, 'text/xml');
        const channelTitle = xml.querySelector('channel > title')?.textContent || '';
        Array.from(xml.querySelectorAll('item')).forEach(i => {
          all.push({
            title: i.querySelector('title')?.textContent || '',
            link: i.querySelector('link')?.textContent || '#',
            source: channelTitle,
            ts: new Date(i.querySelector('pubDate')?.textContent).getTime() || 0
          });
        });
      } catch(e) {}
    }));
    if(!all.length) return;
    all.sort((a,b) => b.ts - a.ts);
    const items = all.slice(0, 20);
    const showSource = urls.length > 1;
    document.getElementById('headline-content').innerHTML = items.map(i =>
      `<a href="${i.link}" target="_blank" class="headline-item"><span class="headline-badge">${showSource && i.source ? i.source : 'NEW'}</span>${i.title}</a>`
    ).join('');
  }

  async function fetchMarketTicker() {
    const container = document.getElementById('market-ticker');
    if(!appState.markets?.length) { container.innerHTML = ''; return; }
    
    const results = await Promise.all(appState.markets.map(async (m) => {
      try {

  // NISA投資信託処理（GASを経由せず直接取得してBotブロックを回避）

  async function fetchAndRenderNisa(widgetId, code, period) {
    const priceEl = document.getElementById('nisa-price-' + widgetId);
    if (!priceEl) return;

    if (!nisaDataCache[widgetId] || nisaDataCache[widgetId].code !== code) {
      priceEl.textContent = "取得中...";
      try {
        // alloriginsという無料のプロキシを経由して、ブラウザから直接みんかぶのHTMLを取得
        const targetUrl = 'https://itf.minkabu.jp/fund/' + encodeURIComponent(code);
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
        
        const response = await fetch(proxyUrl);
        const data = await response.json();
        if (!data.contents) throw new Error("取得失敗");
        
        const html = data.contents;

        // JS側でHTMLからデータを抽出
        const priceMatch = html.match(/class="[^"]*fw_b fz_l text_r[^"]*">([\d,]+)<span/i) || html.match(/基準価額.*?([\d,]+)円/);
        const currentPrice = priceMatch ? parseInt(priceMatch[1].replace(/,/g, ''), 10) : 0;

        const diffMatch = html.match(/class="[^"]*fw_b fz_m text_r[^"]*">.*?([+-]?[\d,]+)<\/span>円/i) || html.match(/([+-]?[\d,]+)円/);
        const diff = diffMatch ? parseInt(diffMatch[1].replace(/,/g, ''), 10) : 0;

        const history = [];
        const historyRegex = /\[(\d{13}),([\d\.]+)\]/g;
        let match;
        while ((match = historyRegex.exec(html)) !== null) {
          history.push({ date: parseInt(match[1], 10), price: parseFloat(match[2]) });
        }
        history.sort((a, b) => a.date - b.date);

        if (currentPrice === 0) throw new Error("価格が見つかりません");

        nisaDataCache[widgetId] = { code: code, data: { currentPrice, diff, history }, period: period };
      } catch (e) {
        priceEl.textContent = "取得失敗";
        document.getElementById('nisa-diff-' + widgetId).textContent = "Botブロック、またはURL不正";
        return;
      }
    }
    renderNisaChartOnly(widgetId, period);
  }

  window.renderNisaChartOnly = function(widgetId, period) {
    const cache = nisaDataCache[widgetId];
    if (!cache) return;
    cache.period = period;
    const data = cache.data;

    document.getElementById('nisa-price-' + widgetId).textContent = data.currentPrice.toLocaleString() + ' 円';
    const diffEl = document.getElementById('nisa-diff-' + widgetId);
    diffEl.textContent = (data.diff >= 0 ? '+' : '') + data.diff.toLocaleString() + ' 円';
    diffEl.className = data.diff >= 0 ? 'diff-up' : 'diff-down';

    const history = data.history || [];
    if (history.length === 0) return;

    const now = new Date();
    let cutoffDate = new Date();
    if (period === '1W') cutoffDate.setDate(now.getDate() - 7);
    else if (period === '1M') cutoffDate.setMonth(now.getMonth() - 1);
    else if (period === '3M') cutoffDate.setMonth(now.getMonth() - 3);
    else if (period === '6M') cutoffDate.setMonth(now.getMonth() - 6);
    else if (period === 'YTD') cutoffDate = new Date(now.getFullYear(), 0, 1);
    else if (period === '1Y') cutoffDate.setFullYear(now.getFullYear() - 1);
    const cutoff = cutoffDate.getTime();

    const filtered = history.filter(d => d.date >= cutoff).sort((a,b) => a.date - b.date);
    if (filtered.length === 0) return;

    const basePrice = filtered[0].price;
    const labels = filtered.map(d => new Date(d.date).toLocaleDateString('ja-JP', {month:'short', day:'numeric'}));
    const rates = filtered.map(d => ((d.price - basePrice) / basePrice) * 100);

    const pLabels = {'1W':'1週間', '1M':'1ヶ月', '3M':'3ヶ月', '6M':'半年', 'YTD':'年初来', '1Y':'1年'};
    document.getElementById('nisa-controls-' + widgetId).innerHTML = Object.keys(pLabels).map(p => 
      `<button onclick="window.renderNisaChartOnly('${widgetId}', '${p}')" style="background:${p===period ? 'rgba(233,30,99,0.3)' : 'transparent'}; border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:4px; padding:4px 8px; margin-right:5px; cursor:pointer; font-size:0.8rem;">${pLabels[p]}</button>`
    ).join('');

    window['nisaChartInstance_' + widgetId] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '高騰率 (%)',
          data: rates,
          borderColor: '#e91e63',
          backgroundColor: 'rgba(233, 30, 99, 0.15)',
          borderWidth: 2.5,
          pointRadius: 0,
          pointHoverRadius: 5,
          fill: true,
          tension: 0.15
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `${ctx.parsed.y>0?'+':''}${ctx.parsed.y.toFixed(2)}%` } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#ccc', maxTicksLimit: 6 } },
          y: {
            grace: '5%', 
            grid: { color: (c) => c.tick.value === 0 ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.1)', lineWidth: (c) => c.tick.value === 0 ? 2 : 1 },
            ticks: { color: '#ccc', callback: (v) => v.toFixed(1) + '%' }
          }
        }
      }

    if (!appState.markets || appState.markets.length === 0) {
      sumContainer.innerHTML = '銘柄が登録されていません。上部の「編集モード」から追加してください。'; return;

          try {
            const res = await callGasApi({ action: 'rss', url: `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(m.symbol)}?range=1y&interval=1d` });
            if(!res.data) return { market: m, error: true };
            const data = JSON.parse(res.data);
            if(!data.chart || !data.chart.result) return { market: m, error: true };

          } catch(e) { return { market: m, error: true }; }

  window.renderChartOnly = function(widgetId, period) {
    const cache = chartDataCache[widgetId]; if (!cache) return;
    cache.period = period; const rawData = cache.raw;
    if(rawData.length === 0) {
      document.getElementById('chart-summary-' + widgetId).innerHTML = '有効なチャートデータがありません。';
      return;
    }

    const now = new Date(); let cutoffDate = new Date();
    if (period === '1W') cutoffDate.setDate(now.getDate() - 7);
    else if (period === '1M') cutoffDate.setMonth(now.getMonth() - 1);
    else if (period === '3M') cutoffDate.setMonth(now.getMonth() - 3);
    else if (period === '6M') cutoffDate.setMonth(now.getMonth() - 6);
    else if (period === 'YTD') cutoffDate = new Date(now.getFullYear(), 0, 1);
    else if (period === '1Y') cutoffDate.setFullYear(now.getFullYear() - 1);
    const cutoff = Math.floor(cutoffDate.getTime() / 1000);

    let tsSet = new Set();
    rawData.forEach(d => { d.timestamps.forEach(t => { if (t >= cutoff) tsSet.add(t); }); });
    const sortedTs = Array.from(tsSet).sort((a,b)=>a-b);
    const labels = sortedTs.map(t => new Date(t*1000).toLocaleDateString('ja-JP', {month:'short', day:'numeric'}));

    const datasets = []; let summaryHtml = '';
    rawData.forEach((d, i) => {
      const priceMap = {}; d.timestamps.forEach((t, idx) => priceMap[t] = d.closes[idx]);
      const dataPoints = []; let basePrice = null; let lastP = null;

      sortedTs.forEach(t => {
        let p = priceMap[t] !== undefined ? priceMap[t] : lastP;
        if (p !== null && basePrice === null) basePrice = p; 
        lastP = p;
        dataPoints.push((basePrice !== null && p !== null) ? ((p - basePrice) / basePrice) * 100 : null);
      });

      const color = CHART_COLORS[i % CHART_COLORS.length];
      datasets.push({
        label: d.market.label, data: dataPoints, borderColor: color, backgroundColor: color,
        borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, tension: 0.1
      });

      let finalReturn = dataPoints.length > 0 ? dataPoints[dataPoints.length - 1] : 0;
      if(finalReturn === null) finalReturn = 0;
      summaryHtml += `<div style="background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:8px;">
                        <span style="color:${color}; font-size:1.2rem; vertical-align:middle;">■</span> 
                        ${d.market.label}: <b class="${finalReturn>=0?'diff-up':'diff-down'}">${finalReturn>=0?'+':''}${finalReturn.toFixed(1)}%</b>
                      </div>`;
    });

    const pLabels = {'1W':'1週間', '1M':'1ヶ月', '3M':'3ヶ月', '6M':'半年', 'YTD':'年初来', '1Y':'1年'};
    document.getElementById('chart-controls-' + widgetId).innerHTML = Object.keys(pLabels).map(p => 
      `<button onclick="window.renderChartOnly('${widgetId}', '${p}')" style="background:${p===period ? 'rgba(130,200,255,0.3)' : 'transparent'}; border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:4px; padding:4px 8px; margin-right:5px; cursor:pointer; font-size:0.8rem;">${pLabels[p]}</button>`
    ).join('');
    document.getElementById('chart-summary-' + widgetId).innerHTML = summaryHtml;

    const ctx = document.getElementById('canvas-' + widgetId).getContext('2d');
    if (window['chartInstance_' + widgetId]) window['chartInstance_' + widgetId].destroy();
    window['chartInstance_' + widgetId] = new Chart(ctx, {
      type: 'line', data: { labels: labels, datasets: datasets },
      options: {
        responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y>0?'+':''}${ctx.parsed.y.toFixed(1)}%` } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#ccc', maxTicksLimit: 8 } },
          y: {
            grace: '10%', 
            grid: { color: (c) => c.tick.value === 0 ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.1)', lineWidth: (c) => c.tick.value === 0 ? 2 : 1 },
            ticks: { color: '#ccc', callback: (v) => v.toFixed(1) + '%' }
          }
        }
      }
    });
  };

  function renderCalendar(id) {
    const cache = calCache[id]; if(!cache) return;

    let html = `<div class="cal-header"><button onclick="moveMonth('${id}',-1)">＜</button><b>${cache.targetYear}年 ${cache.targetMonth}月</b><button onclick="moveMonth('${id}',1)">＞</button></div><div class="cal-grid">`;

    const first = new Date(cache.targetYear, cache.targetMonth-1, 1).getDay(); const last = new Date(cache.targetYear, cache.targetMonth, 0).getDate();
    for(let i=0; i<first; i++) html += '<div class="cal-cell" style="opacity:0.1"></div>';
    for(let d=1; d<=last; d++) {
      const evs = cache.events.filter(e => new Date(e.startTime).getDate() === d);

  window.moveMonth = function(id, d) { let c = calCache[id]; let m = c.targetMonth+d; let y = c.targetYear; if(m>12){m=1;y++} if(m<1){m=12;y--} loadCalendarData(id,y,m); }

  function initDragEvents() {
    document.querySelectorAll('.widget-drag-handle').forEach(h => { h.onmousedown = (e) => startDrag(e, 'widget'); h.ontouchstart = (e) => startDrag(e, 'widget'); });
    document.querySelectorAll('.drag-handle').forEach(h => { h.onmousedown = (e) => startDrag(e, 'item'); h.ontouchstart = (e) => startDrag(e, 'item'); });
  }
  function startDrag(e, type) {
    if (!isEditMode) return; dragType = type;
    if (type === 'item') { dragEl = e.target.closest('li'); sourceId = dragEl.getAttribute('data-widget-id'); dragEl.classList.add('dragging'); } 
    else { dragEl = e.target.closest('.widget-wrapper'); sourceId = dragEl.id.replace('wrap-', ''); dragEl.classList.add('dragging-widget'); }
    document.addEventListener('mousemove', onDragMove); document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchmove', onDragMove, {passive: false}); document.addEventListener('touchend', onDragEnd);
  }
  function onDragMove(e) {
    if (!dragEl) return; e.preventDefault();
    const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    const y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
    const target = document.elementFromPoint(x, y); if (!target) return;
    if (dragType === 'item') {
      const tLi = target.closest('li');
      if (tLi && tLi !== dragEl && tLi.getAttribute('data-widget-id') === sourceId) { if (y < tLi.getBoundingClientRect().top + tLi.offsetHeight / 2) tLi.before(dragEl); else tLi.after(dragEl); }
    } else {
      const tWrap = target.closest('.widget-wrapper'); const tRow = target.closest('.dashboard-row');
      if (tWrap && tWrap !== dragEl) { if (x < tWrap.getBoundingClientRect().left + tWrap.offsetWidth / 2) tWrap.before(dragEl); else tWrap.after(dragEl); } 
      else if (tRow && tRow !== dragEl.parentNode) tRow.appendChild(dragEl);
    }
  }
  function onDragEnd() {
    if (!dragEl) return;
    document.removeEventListener('mousemove', onDragMove); document.removeEventListener('mouseup', onDragEnd);
    document.removeEventListener('touchmove', onDragMove); document.removeEventListener('touchend', onDragEnd);
    if (dragType === 'item') {
      findWidget(sourceId).items = Array.from(dragEl.parentNode.children).map(li => ({ title: li.getAttribute('data-title'), url: li.getAttribute('data-url') }));
    } else {
      const newRows = []; document.querySelectorAll('.dashboard-row').forEach(rowEl => {
        const rowWidgets = []; rowEl.querySelectorAll('.widget-wrapper').forEach(wEl => { const w = findWidget(wEl.id.replace('wrap-', '')); if (w) rowWidgets.push(w); });
        if (rowWidgets.length) newRows.push(rowWidgets);
      });
      appState.rows = newRows;
    }
    dragEl = null; save(); renderAll();
  }

  async function fetchRssWidget(id, urls) {
    const cont = document.getElementById('rss-'+id); if(!cont || !urls.length) return;
    try {
      const res = await Promise.all(urls.map(u => callGasApi({ action: 'rss', url: u.url }).then(r => ({ name: u.name, d: r.data }))));
      let items = [];
      res.forEach(r => { 
        if(!r.d || r.d.includes('<error>')) return; 
        const xml = new DOMParser().parseFromString(r.d, 'text/xml'); 
        const parsedItems = Array.from(xml.querySelectorAll('item'));
        parsedItems.forEach(i => items.push({ t: i.querySelector('title')?.textContent, l: i.querySelector('link')?.textContent, s: r.name, ts: new Date(i.querySelector('pubDate')?.textContent).getTime() })); 
      });
      
      // RSSの記事が見つからなかった場合のエラー表示
      if (items.length === 0) {
         cont.innerHTML = '<div style="padding:15px; font-size:0.85rem; color:#ff8a80; text-align:center;">記事が見つかりません。<br>登録したURLがXML形式(RSS)か確認してください。</div>';
         return;
      }
      
      items.sort((a,b) => b.ts - a.ts);
      cont.innerHTML = '<ul>' + items.slice(0, 12).map(i => `<li><div class="item-content"><small class="headline-badge" style="background:none; border:1px solid #82c8ff; color:#82c8ff; font-weight:normal; padding:1px 4px;">${i.s}</small><a href="${i.l}" target="_blank">${i.t}</a></div></li>`).join('') + '</ul>';
    } catch(e) {
       cont.innerHTML = '<div style="padding:15px; font-size:0.85rem; color:#ff8a80; text-align:center;">通信エラーが発生しました。</div>';
    }
  }

  // データ初期化
  function initDataSafely() {
    try {
      const saved = localStorage.getItem('portal_state');
      if (saved) { appState = JSON.parse(saved); if (!appState.rows || !Array.isArray(appState.rows)) appState.rows = [[]]; }
      else {
        appState = { clock: { size: 2.2, font: 'system-ui' }, headlineUrls: ['https://news.yahoo.co.jp/rss/topics/top-picks.xml'], headlineSpeed: 45, markets: [{ symbol: '^GSPC', label: 'S&P 500' }, { symbol: '^N225', label: '日経平均' }], rows: [[{ id: 'w1', type: 'bookmark', title: 'Daily', widthPct: 50, items: [{ title: 'Google', url: 'https://google.com' }] }, { id: 'w2', type: 'rss', title: 'News', widthPct: 50, urls: [{ url: 'https://news.yahoo.co.jp/rss/topics/it.xml', name: 'Yahoo! IT' }] }]] };
      }
      if (typeof appState.headlineUrl === 'string') {
        appState.headlineUrls = appState.headlineUrl ? [appState.headlineUrl] : [];
        delete appState.headlineUrl;
      }
      if (!Array.isArray(appState.headlineUrls)) appState.headlineUrls = [];
    } catch (e) { document.getElementById('error-overlay').style.display = 'flex'; }
  }

  window.toggleEditMode = function() { isEditMode = !isEditMode; document.body.classList.toggle('is-edit-mode', isEditMode); document.getElementById('edit-toggle-btn').textContent = isEditMode ? '完了' : '⚙️ 編集モード'; renderAll(); fetchMarketTicker(); }
  window.setWidth = function(id, p) { findWidget(id).widthPct = p; save(); renderAll(); }
  window.addB = function(id) { const t=prompt('名:'); const u=prompt('URL:'); if(t&&u){ findWidget(id).items.push({title:t,url:u}); save(); renderAll(); } }
  window.delB = function(id, i) { findWidget(id).items.splice(i,1); save(); renderAll(); }
  window.addR = function(id) { const u=prompt('URL:'); const n=prompt('名:'); if(u&&n){ findWidget(id).urls.push({url:u,name:n}); save(); renderAll(); } }
  window.delR = function(id, i) { findWidget(id).urls.splice(i,1); save(); renderAll(); }
  function save() { localStorage.setItem('portal_state', JSON.stringify(appState)); }
  function findWidget(id) { for(let r of appState.rows) { for(let w of r) { if(w.id === id) return w; } } }
  window.deleteWidget = function(id) { appState.rows.forEach(r => { const i = r.findIndex(w => w.id === id); if(i>-1) r.splice(i,1); }); save(); renderAll(); }
  window.addNewRow = function() { appState.rows.push([]); save(); renderAll(); }
  window.addNewWidget = function(type) { const t = prompt('タイトル:'); if(t===null) return; const w = { id: 'w'+Date.now(), type, title: t, widthPct: 100, items: [], urls: [] }; if(!appState.rows.length) appState.rows.push([]); appState.rows[appState.rows.length-1].push(w); save(); renderAll(); }
  window.saveHeaderSettings = function() {
    appState.clock.size = document.getElementById('clock-size').value;
    appState.clock.font = document.getElementById('clock-font').value;
    appState.headlineUrls = document.getElementById('headline-url').value.split('\n').map(s => s.trim()).filter(Boolean);
    appState.headlineSpeed = document.getElementById('headline-speed').value;
    save();
  }
  
  function initResize(e, leftId, rightId) {
    const leftW = findWidget(leftId); const rightW = findWidget(rightId); 
    const startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; 
    const startL = leftW.widthPct; const startR = rightW.widthPct;
    const move = (me) => { 
      const currentX = me.type.includes('touch') ? me.touches[0].clientX : me.clientX;
      const delta = ((currentX - startX) / window.innerWidth) * 100; 
      leftW.widthPct = Math.max(10, startL + delta); rightW.widthPct = Math.max(10, startR - delta); 
      document.getElementById('wrap-'+leftId).style.width = leftW.widthPct + '%'; document.getElementById('wrap-'+rightId).style.width = rightW.widthPct + '%'; 
    };
    const up = () => { 
      document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); 
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', up); 
      save(); 
    };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
    document.addEventListener('touchmove', move, {passive: false}); document.addEventListener('touchend', up);
  }

  function updateClock() {
    const n = new Date(); const timeEl = document.getElementById('time'); const dateEl = document.getElementById('date');
    if(timeEl) timeEl.textContent = n.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
    if(dateEl) dateEl.textContent = n.toLocaleDateString('ja-JP', {year:'numeric',month:'short',day:'numeric',weekday:'short'});
  }

  window.onload = () => {
    initDataSafely();
    if(appState) {
      document.getElementById('clock-size').value = appState.clock.size; document.getElementById('clock-font').value = appState.clock.font; document.getElementById('headline-url').value = (appState.headlineUrls || []).join('\n'); document.getElementById('headline-speed').value = appState.headlineSpeed || 45;
      applyBackground(); applyClockStyle(); applyHeadlineSpeed(); renderAll(); fetchHeadlineRss(); fetchMarketTicker(); initStockSearch(); updateClock(); setInterval(updateClock, 1000);
      
      window.addEventListener('resize', () => { 
        Object.keys(chartDataCache).forEach(widgetId => { if (window['chartInstance_' + widgetId]) window['chartInstance_' + widgetId].resize(); }); 
        Object.keys(nisaDataCache).forEach(widgetId => { if (window['nisaChartInstance_' + widgetId]) window['nisaChartInstance_' + widgetId].resize(); }); 
      });
    }
  };
</script>
