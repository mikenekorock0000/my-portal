<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* =========================================
       基本スタイル
       ========================================= */
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-size: cover; background-position: center; background-attachment: fixed;
      transition: background-image 0.5s ease-in-out;
      color: #ffffff; text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
      background-color: #2c3e50; overscroll-behavior-y: none; 
    }
    .container { max-width: 1600px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    
    .glass {
      background: rgba(20, 20, 20, 0.45); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    
    header { display: flex; flex-direction: column; gap: 15px; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; }
    
    #clock-widget h1 { margin: 0; font-weight: 300; letter-spacing: 2px; line-height: 1.1; transition: all 0.2s;}
    #clock-widget p { margin: 5px 0 0 0; font-size: 1rem; color: rgba(255,255,255,0.8); }
    
    .market-ticker-container { 
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; 
      border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px;
    }
    .market-ticker-container::-webkit-scrollbar { display: none; }
    .market-item { display: flex; align-items: baseline; gap: 6px; background: rgba(0,0,0,0.25); padding: 6px 14px; border-radius: 8px; white-space: nowrap; }
    .market-label { font-size: 0.85rem; color: #ccc; }
    .market-price { font-size: 1rem; font-weight: bold; }
    .market-diff { font-size: 0.85rem; font-weight: 500;}
    .diff-up { color: #ff8a80; }
    .diff-down { color: #82c8ff; }

    .headline-ticker {
      width: 100%; overflow: hidden; white-space: nowrap; background: rgba(0,0,0,0.2);
      border-radius: 8px; padding: 10px 0; position: relative; display: flex; align-items: center;
    }
    .headline-content { display: inline-block; padding-left: 100%; animation: marquee 45s linear infinite; }
    .headline-ticker:hover .headline-content { animation-play-state: paused; }
    .headline-item { margin-right: 50px; color: #fff; text-decoration: none; font-size: 0.95rem; }
    .headline-item:hover { color: #82c8ff; text-decoration: underline; }
    .headline-badge { background: #E50914; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 8px; font-weight: bold; }
    
    @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

    .search-container {
      display: flex; flex-direction: column; align-items: center; margin-top: 10px; margin-bottom: 5px; width: 100%;
    }
    .search-bar {
      display: flex; gap: 10px; width: 100%; max-width: 750px; position: relative;
    }
    .search-input-wrapper {
      display: flex; flex-grow: 1; position: relative;
    }
    .search-input {
      flex-grow: 1; padding: 12px 20px; border-radius: 25px; border: 2px solid transparent; font-size: 1.05rem; 
      padding-right: 45px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); outline: none; color: #333; transition: 0.3s;
    }
    .search-submit-btn {
      position: absolute; right: 5px; top: 5px; bottom: 5px; background: transparent; 
      border: none; font-size: 1.2rem; color: #555; cursor: pointer; padding: 0 10px;
    }
    .gemini-btn {
      border-radius: 25px; padding: 0 20px; display: flex; align-items: center; justify-content: center; 
      background: linear-gradient(135deg, #1a73e8, #8ab4f8); border: 2px solid transparent; font-weight: bold; 
      font-size: 1rem; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; transition: 0.2s; white-space: nowrap;
    }
    .gemini-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .gemini-btn.active {
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.8); background: linear-gradient(135deg, #0d47a1, #1976d2);
    }
    .gemini-options-panel {
      display: none; justify-content: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; max-width: 750px; width: 100%;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    
    .gemini-opt-label {
      background: rgba(0,0,0,0.4); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; 
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1);
    }
    .gemini-opt-label input[type="checkbox"] { accent-color: #8ab4f8; }

    input[type="text"].edit-input, select { padding: 8px 12px; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.9); outline: none; color: #333; }
    input[type="range"] { accent-color: #82c8ff; }
    button.ui-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255, 255, 255, 0.15); color: white; cursor: pointer; transition: 0.2s; }
    button.ui-btn:hover { background: rgba(255, 255, 255, 0.3); }
    .danger-btn { background: rgba(255, 50, 50, 0.3); border-color: rgba(255, 50, 50, 0.5); }
    .primary-btn { background: rgba(0, 122, 255, 0.6); border-color: rgba(0, 122, 255, 0.8); }
    
    .edit-only, .edit-only-inline, .edit-only-block { display: none !important; } 
    body.is-edit-mode .edit-only { display: flex !important; } 
    body.is-edit-mode .edit-only-inline { display: inline-block !important; }
    body.is-edit-mode .edit-only-block { display: block !important; }

    #widget-container { display: flex; flex-direction: column; gap: 15px; }
    .dashboard-row { display: flex; flex-wrap: nowrap; width: 100%; align-items: stretch; gap: 15px; transition: padding 0.3s, background 0.3s; }
    body.is-edit-mode .dashboard-row { padding: 15px; background: rgba(0, 0, 0, 0.15); border: 1px dashed rgba(255, 255, 255, 0.2); border-radius: 15px; }
    
    .widget-wrapper { display: flex; flex-direction: column; position: relative; }
    .widget { flex-grow: 1; display: flex; flex-direction: column; margin: 0; }
    .widget-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 15px; }
    .widget-header h2 { margin: 0; font-size: 1.1rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .widget-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end;}
    .preset-btn { padding: 4px 8px; font-size: 0.75rem; background: transparent; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; color: white; cursor: pointer; }
    .widget-drag-handle { cursor: grab; padding-right: 10px; font-size: 1.2rem; color: #82c8ff; display: none; }
    body.is-edit-mode .widget-drag-handle { display: block; }
    
    ul { list-style: none; padding: 0; margin: 0; flex-grow: 1;}
    li { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.05); position: relative; }
    .item-content { flex-grow: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
    .item-content a { color: #ffffff; text-decoration: none; }
    .drag-handle { cursor: grab; padding: 0 10px 0 0; color: rgba(255,255,255,0.5); font-size: 1.5rem; }
    
    .rss-source-badge { font-size: 0.7rem; color: #82c8ff; border: 1px solid rgba(130,200,255,0.4); padding: 1px 4px; border-radius: 4px; margin-right: 5px; }
    .rss-date { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-left: 8px; }
    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }

    /* カレンダーUI */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
    .cal-header button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 15px; border-radius: 8px; cursor: pointer; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: rgba(255,255,255,0.15); border-radius: 8px; overflow: hidden; }
    .cal-day-header { text-align: center; font-size: 0.8rem; padding: 6px 0; background: rgba(0,0,0,0.4); }
    .cal-cell { min-height: 80px; background: rgba(0,0,0,0.25); padding: 4px; display: flex; flex-direction: column; gap: 2px; }
    .cal-date { font-size: 0.85rem; text-align: right; color: #eee; }
    .cal-event { font-size: 0.75rem; padding: 3px 6px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; font-weight: 500; }
  </style>
</head>
<body>

<div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
  <h2>⚠️ プログラムエラーが発生しました</h2>
  <p id="error-msg" style="color:#ff8a80; font-size:0.9rem; margin-bottom: 20px;"></p>
  <button onclick="localStorage.removeItem('portal_state'); location.reload();" style="margin-top:20px; padding:15px 30px; font-size:1.1rem; background:#E50914; color:white; border:none; border-radius:8px; cursor:pointer;">データを全消去して復旧</button>
</div>

<div class="container" id="main-app">
  <header class="glass">
    <div class="header-top">
      <div id="clock-widget" style="display:flex; align-items: center; gap: 15px; flex-shrink: 0;">
        <div>
          <h1 id="time">00:00</h1>
          <p id="date">--</p>
        </div>
        <div class="edit-only-block" style="background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 10px;">
          <div style="font-size: 0.8rem; color: #ccc; margin-bottom: 5px;">⌚ 時計デザイン</div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 0.8rem;">サイズ: <input type="range" id="clock-size" min="1.5" max="5.0" step="0.1" value="2.2" oninput="applyClockStyle()" onchange="saveHeaderSettings()" style="width:100px;"></label>
            <label style="font-size: 0.8rem;">フォント: 
              <select id="clock-font" onchange="applyClockStyle(); saveHeaderSettings();" style="font-size: 0.8rem; padding: 4px;">
                <option value="system-ui, sans-serif">標準</option>
                <option value="'Noto Serif JP', serif">明朝体</option>
                <option value="'Courier New', monospace">等幅</option>
              </select>
            </label>
          </div>
        </div>
      </div>
      
      <div style="flex-grow: 1; min-width: 250px; overflow: hidden; display: flex; flex-direction: column; justify-content: center;">
        <div id="market-ticker" class="market-ticker-container"></div>
        <div class="edit-only-block" style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: 10px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <span style="font-size:0.8rem; color:#ddd;">📈 株価シンボル</span>
            <button class="ui-btn" onclick="addMarketSymbol()" style="font-size:0.7rem; padding:4px 8px;">＋追加</button>
          </div>
          <ul id="market-edit-list" style="display:flex; flex-wrap:wrap; gap:8px; margin:0; padding:0;"></ul>
        </div>
      </div>
      
      <div style="display: flex; gap: 10px; align-items: center;">
        <button id="edit-toggle-btn" class="ui-btn primary-btn" onclick="toggleEditMode()">⚙️ 編集モード</button>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:5px; margin-top: 10px;">
      <div class="headline-ticker">
        <div class="headline-content" id="headline-content">ニュースを読み込み中...</div>
      </div>
      <div class="edit-only" style="gap:10px; align-items:center; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 10px;">
        <span style="font-size:0.8rem; color:#aaa;">ヘッドラインRSS:</span>
        <input type="text" class="edit-input" id="headline-url" style="width: 300px; font-size:0.8rem;">
        <span style="font-size:0.8rem; color:#aaa;">速度:</span>
        <input type="range" id="headline-speed" min="10" max="120" step="1" oninput="applyHeadlineSpeed()" onchange="saveHeaderSettings()">
        <button class="ui-btn" onclick="saveHeaderSettings(); fetchHeadlineRss();" style="font-size:0.8rem;">更新</button>
      </div>
    </div>

    <div class="search-container">
      <div class="search-bar">
        <form onsubmit="handleSearchSubmit(event)" class="search-input-wrapper">
          <input type="text" id="main-search-input" class="search-input" placeholder="Google または Gemini で検索..." autocomplete="off">
          <button type="submit" id="main-search-btn" class="search-submit-btn">🔍</button>
        </form>
        <button type="button" id="gemini-toggle-btn" class="gemini-btn" onclick="toggleGeminiMode()">✨ Gemini</button>
      </div>
      <div id="gemini-options-panel" class="gemini-options-panel">
        <label class="gemini-opt-label"><input type="checkbox" id="gem-opt-think"> 🧠 思考プロセス開示</label>
        <label class="gemini-opt-label"><input type="checkbox" id="gem-opt-prog"> 💻 プログラマ視点</label>
        <label class="gemini-opt-label"><input type="checkbox" id="gem-opt-step"> 📋 ステップバイステップ</label>
      </div>
    </div>
  </header>

  <main id="widget-container"></main>

  <div class="edit-only" style="justify-content: center; margin-top: 20px; gap: 15px; flex-wrap: wrap;">
    <button class="ui-btn" onclick="addNewWidget('bookmark')">＋ ブックマーク枠</button>
    <button class="ui-btn" onclick="addNewWidget('rss')">＋ RSSリーダー</button>
    <button class="ui-btn" onclick="addNewWidget('calendar')">＋ カレンダー枠</button>
    <button class="ui-btn" onclick="addNewWidget('spacer')" style="border-style: dashed;">＋ 空白枠</button>
    <button class="ui-btn primary-btn" onclick="addNewRow()">＋ 新しい段を追加</button>
  </div>
</div>

<script>
  // ==========================================
  // 【重要】API URLの設定
  // ==========================================
  const GAS_API_URL = 'ここにあなたのGASのURLを貼ってください';

  var appState = null;
  var rssDataCache = {};
  var calendarDataCache = {};
  var isEditMode = false;
  var isGeminiMode = false;
  var resizeData = null;
  var dragEl = null;

  var defaultState = {
    bgUrl: 'https://images.unsplash.com/photo-1506744626753-dba37c2de9d5?auto=format&fit=crop&w=1920&q=80',
    clock: { size: '2.2', font: 'system-ui, sans-serif' },
    headlineUrl: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
    headlineSpeed: 45,
    markets: [{ symbol: '^GSPC', label: 'S&P 500' }, { symbol: '^N225', label: '日経平均' }, { symbol: 'USDJPY=X', label: 'USD/JPY' }],
    rows: [[{ id: 'w1', type: 'bookmark', title: 'Daily', widthPct: 50, items: [{ title: 'Google', url: 'https://google.com' }] }, { id: 'w2', type: 'rss', title: 'News', widthPct: 50, urls: [{ url: 'https://news.yahoo.co.jp/rss/topics/it.xml', name: 'Yahoo! IT' }] }]]
  };

  // ==========================================
  // 通信ユーティリティ
  // ==========================================
  async function callGasApi(params) {
    if (!GAS_API_URL || GAS_API_URL.includes('https://script.google.com/macros/s/AKfycbxzjNS50HSy3lGFx3jM5u6hlJwh5t76t6bQmHzjMy1Z_0Z_7aVwvDzy-UOAKSmdXxkpWQ/exec')) {
      alert('GAS_API_URLが設定されていません。コードの338行目を確認してください。');
      throw new Error('API URL not set');
    }
    const queryString = new URLSearchParams(params).toString();
    const response = await fetch(`${GAS_API_URL}?${queryString}`);
    if (!response.ok) throw new Error('Network response was not ok');
    return await response.json();
  }

  function hexToRgba(hex, alpha) {
    var r = 0, g = 0, b = 0;
    if (!hex) return 'rgba(100,100,100,' + alpha + ')';
    if (hex.length === 4) { r = parseInt(hex[1] + hex[1], 16); g = parseInt(hex[2] + hex[2], 16); b = parseInt(hex[3] + hex[3], 16); } 
    else if (hex.length === 7) { r = parseInt(hex.substring(1, 3), 16); g = parseInt(hex.substring(3, 5), 16); b = parseInt(hex.substring(5, 7), 16); }
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ==========================================
  // 検索・Gemini
  // ==========================================
  function toggleGeminiMode() {
    isGeminiMode = !isGeminiMode;
    document.getElementById('gemini-options-panel').style.display = isGeminiMode ? 'flex' : 'none';
    document.getElementById('gemini-toggle-btn').classList.toggle('active', isGeminiMode);
  }

  function handleSearchSubmit(e) {
    e.preventDefault();
    var query = document.getElementById('main-search-input').value.trim();
    if (!query) return;
    if (isGeminiMode) {
      var opts = [];
      if (document.getElementById('gem-opt-think').checked) opts.push("思考プロセスを明確に出力してください。");
      if (document.getElementById('gem-opt-prog').checked) opts.push("プログラマ視点でコード例を含めてください。");
      if (document.getElementById('gem-opt-step').checked) opts.push("ステップバイステップで回答してください。");
      var finalQuery = opts.length > 0 ? "【システム指示】\n" + opts.join("\n") + "\n\n【ユーザー入力】\n" + query : query;
      window.open('https://gemini.google.com/app?q=' + encodeURIComponent(finalQuery), '_blank');
    } else {
      window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
    }
  }

  // ==========================================
  // ヘッダー機能
  // ==========================================
  function initHeaderSettings() {
    document.getElementById('clock-size').value = appState.clock.size;
    document.getElementById('clock-font').value = appState.clock.font;
    document.getElementById('headline-url').value = appState.headlineUrl;
    document.getElementById('headline-speed').value = appState.headlineSpeed;
    applyClockStyle(); applyHeadlineSpeed(); fetchHeadlineRss(); fetchMarketTicker();
  }

  function applyClockStyle() {
    var timeEl = document.getElementById('time');
    timeEl.style.fontSize = document.getElementById('clock-size').value + 'rem';
    timeEl.style.fontFamily = document.getElementById('clock-font').value;
  }

  function applyHeadlineSpeed() {
    var speed = document.getElementById('headline-speed').value;
    var content = document.getElementById('headline-content');
    if (content) content.style.animationDuration = speed + 's';
  }

  function saveHeaderSettings() {
    appState.clock.size = document.getElementById('clock-size').value;
    appState.clock.font = document.getElementById('clock-font').value;
    appState.headlineUrl = document.getElementById('headline-url').value;
    appState.headlineSpeed = document.getElementById('headline-speed').value;
    localStorage.setItem('portal_state', JSON.stringify(appState));
  }

  async function fetchHeadlineRss() {
    var container = document.getElementById('headline-content');
    if (!appState.headlineUrl) return;
    try {
      const res = await callGasApi({ action: 'rss', url: appState.headlineUrl });
      var parser = new DOMParser(); var xmlDoc = parser.parseFromString(res.data, 'text/xml');
      var items = Array.from(xmlDoc.querySelectorAll('item')).slice(0, 15);
      var htmlStr = '';
      items.forEach(function(item) {
        var title = item.querySelector('title')?.textContent || '無題';
        var link = item.querySelector('link')?.textContent || '#';
        htmlStr += `<a href="${link}" target="_blank" class="headline-item"><span class="headline-badge">NEW</span>${title}</a>`;
      });
      container.innerHTML = htmlStr;
    } catch(e) { container.innerHTML = '取得失敗'; }
  }

  async function fetchMarketTicker() {
    var container = document.getElementById('market-ticker');
    if (!appState.markets?.length) return;
    const fetchPromises = appState.markets.map(m => callGasApi({ action: 'rss', url: `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(m.symbol)}?interval=1d` }).then(res => ({ m, data: JSON.parse(res.data) })).catch(e => ({ m, error: e })));
    const results = await Promise.all(fetchPromises);
    container.innerHTML = results.map(res => {
      if (res.error) return `<div class="market-item">${res.m.label}: Error</div>`;
      const meta = res.data.chart.result[0].meta;
      const price = meta.regularMarketPrice;
      const diff = price - (meta.previousClose || price);
      return `<div class="market-item"><span class="market-label">${res.m.label}</span><span class="market-price">${price.toFixed(2)}</span><span class="market-diff ${diff >= 0 ? 'diff-up' : 'diff-down'}">${diff >= 0 ? '△' : '▼'}${Math.abs(diff).toFixed(2)}</span></div>`;
    }).join('');
  }

  // ==========================================
  // RSSデータ取得（★ここがエラーの箇所です）
  // ==========================================
  async function fetchAllRssData(widgetId, urlObjects) {
    var container = document.getElementById('rss-content-' + widgetId);
    if (!container || !urlObjects.length) return;
    container.innerHTML = '読み込み中...';
    try {
      const fetchPromises = urlObjects.map(urlObj => callGasApi({ action: 'rss', url: urlObj.url }).then(res => ({ urlObj, data: res.data })).catch(err => ({ urlObj, error: err })));
      const results = await Promise.all(fetchPromises);
      var allItems = [];
      results.forEach(res => {
        if (res.error || res.data.includes('<error>')) return;
        var parser = new DOMParser(); var xmlDoc = parser.parseFromString(res.data, 'text/xml');
        var itemNodes = Array.from(xmlDoc.querySelectorAll('item'));
        allItems = allItems.concat(itemNodes.map(item => ({
          title: item.querySelector('title')?.textContent || '無題',
          link: item.querySelector('link')?.textContent || '#',
          dateStr: item.querySelector('pubDate')?.textContent ? new Date(item.querySelector('pubDate').textContent).toLocaleDateString('ja-JP') : '',
          timestamp: item.querySelector('pubDate')?.textContent ? new Date(item.querySelector('pubDate').textContent).getTime() : 0,
          source: res.urlObj.name
        })));
      });
      allItems.sort((a, b) => b.timestamp - a.timestamp);
      rssDataCache[widgetId] = { items: allItems, page: 1, expanded: false };
      renderRssContent(widgetId);
    } catch(e) { container.innerHTML = 'エラー発生'; }
  }

  function renderRssContent(widgetId) {
    var cache = rssDataCache[widgetId]; if (!cache) return;
    var itemsPerPage = cache.expanded ? 20 : 5;
    var currentItems = cache.items.slice((cache.page - 1) * itemsPerPage, cache.page * itemsPerPage);
    var htmlStr = '<ul>' + currentItems.map(item => `<li><div class="item-content"><span class="rss-source-badge">${item.source}</span><a href="${item.link}" target="_blank">${item.title}</a></div><span class="rss-date">${item.dateStr}</span></li>`).join('') + '</ul>';
    if (cache.items.length > itemsPerPage) {
      htmlStr += `<div class="pagination"><button onclick="toggleRssExpand('${widgetId}')">${cache.expanded ? '▲ 閉じる' : '▼ もっと見る'}</button></div>`;
    }
    document.getElementById('rss-content-' + widgetId).innerHTML = htmlStr;
  }
  function toggleRssExpand(id) { rssDataCache[id].expanded = !rssDataCache[id].expanded; renderRssContent(id); }

  // ==========================================
  // カレンダー
  // ==========================================
  async function loadCalendarData(widgetId, year, month) {
    var container = document.getElementById('cal-content-' + widgetId);
    if (container) container.innerHTML = '読み込み中...';
    try {
      const res = await callGasApi({ action: 'calendar', year, month });
      calendarDataCache[widgetId] = { year: res.targetYear, month: res.targetMonth, calendars: res.calendars, events: res.events };
      renderCalendarContent(widgetId);
    } catch(e) { if (container) container.innerHTML = '取得失敗'; }
  }

  function renderCalendarContent(widgetId) {
    var cache = calendarDataCache[widgetId]; if (!cache) return;
    var widget = findWidgetById(widgetId);
    var html = `<div class="cal-header"><button onclick="changeCalMonth('${widgetId}',-1)">＜</button><span>${cache.year}年 ${cache.month}月</span><button onclick="changeCalMonth('${widgetId}',1)">＞</button></div>`;
    html += '<div class="cal-grid">';
    ['日','月','火','水','木','金','土'].forEach(d => html += `<div class="cal-day-header">${d}</div>`);
    var firstDay = new Date(cache.year, cache.month - 1, 1).getDay();
    var lastDate = new Date(cache.year, cache.month, 0).getDate();
    for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
    for (var d = 1; d <= lastDate; d++) {
      var dayEvents = cache.events.filter(ev => {
        var evD = new Date(ev.startTime);
        return evD.getDate() === d && (!widget.visibleCalIds?.length || widget.visibleCalIds.includes(ev.calendarId));
      });
      html += `<div class="cal-cell"><div class="cal-date">${d}</div>` + dayEvents.map(ev => `<div class="cal-event" style="background-color:${hexToRgba(ev.color, 0.4)}; border-left:3px solid ${ev.color}">${ev.title}</div>`).join('') + '</div>';
    }
    document.getElementById('cal-content-' + widgetId).innerHTML = html + '</div>';
  }
  function changeCalMonth(id, delta) { 
    var c = calendarDataCache[id]; 
    var m = c.month + delta; var y = c.year;
    if (m > 12) { m = 1; y++; } else if (m < 1) { m = 12; y--; }
    loadCalendarData(id, y, m);
  }

  // ==========================================
  // 全体描画
  // ==========================================
  function renderAll() {
    var container = document.getElementById('widget-container'); container.innerHTML = '';
    appState.rows.forEach(row => {
      var rowDiv = document.createElement('div'); rowDiv.className = 'dashboard-row';
      row.forEach(widget => {
        var wrapper = document.createElement('div'); wrapper.className = 'widget-wrapper'; wrapper.id = 'wrapper-' + widget.id; wrapper.style.width = widget.widthPct + '%';
        var div = document.createElement('div'); div.className = 'widget glass';
        if (widget.type === 'spacer' && !isEditMode) { div.style.visibility = 'hidden'; }
        
        var header = `<div class="widget-header"><h2>${widget.type==='bookmark'?'📌':widget.type==='rss'?'📰':'📅'} ${widget.title||''}</h2><div class="edit-only"><button onclick="deleteWidget('${widget.id}')">削除</button></div></div>`;
        var content = `<div id="${widget.type==='rss'?'rss-content-':widget.type==='calendar'?'cal-content-':''}${widget.id}"></div>`;
        
        if (widget.type === 'bookmark') {
          content = '<ul>' + widget.items.map(item => `<li><div class="item-content"><a href="${item.url}" target="_blank">${item.title}</a></div></li>`).join('') + '</ul>';
        }
        div.innerHTML = header + content;
        wrapper.appendChild(div); rowDiv.appendChild(wrapper);
        
        if (widget.type === 'rss' && !isEditMode) fetchAllRssData(widget.id, widget.urls);
        if (widget.type === 'calendar' && !isEditMode) loadCalendarData(widget.id, new Date().getFullYear(), new Date().getMonth()+1);
      });
      container.appendChild(rowDiv);
    });
  }

  // 基本関数（枠管理など）
  function toggleEditMode() { isEditMode = !isEditMode; document.body.classList.toggle('is-edit-mode', isEditMode); renderAll(); }
  function addNewRow() { appState.rows.push([]); saveAndRender(); }
  function addNewWidget(type) {
    var title = prompt('タイトル:'); if (title === null) return;
    var w = { id: 'w'+Math.random().toString(36).substr(2,9), type, title, widthPct: 100, items: [], urls: [] };
    appState.rows[appState.rows.length-1].push(w); saveAndRender();
  }
  function deleteWidget(id) { appState.rows.forEach(r => { var i = r.findIndex(w => w.id === id); if (i>-1) r.splice(i,1); }); saveAndRender(); }

  function initDataSafely() {
    var saved = localStorage.getItem('portal_state');
    appState = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultState));
    renderAll();
  }

  function updateClock() {
    var now = new Date();
    document.getElementById('time').textContent = now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', {year:'numeric', month:'short', day:'numeric', weekday:'short'});
  }

  window.onload = () => { initDataSafely(); initHeaderSettings(); setInterval(updateClock, 1000); updateClock(); };
</script>
</body>
